name: CI — Microservices

on:
  push:
    branches: [main, master]
    paths:
      - "cmd/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/microservices.yml"
  pull_request:
    paths:
      - "cmd/**"
      - "pkg/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...
