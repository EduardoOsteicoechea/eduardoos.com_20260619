# EC2 (ARM64 / Graviton) overlay — merge with the base compose file.
#
# Local Docker Desktop (amd64):  docker compose up -d --build
# EC2 Graviton (arm64):         docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --build
#
# Forces linux/arm64 images and enables real AWS backends (DynamoDB + S3).
# Credentials come from the EC2 instance profile — no keys in .env required.

services:
  frontend:
    platform: linux/arm64

  backend:
    platform: linux/arm64

  authenticator:
    platform: linux/arm64

  database:
    platform: linux/arm64
    environment:
      DATABASE_BACKEND: dynamodb
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_PREFIX: ${DYNAMODB_TABLE_PREFIX:-eduardoos}

  documents:
    platform: linux/arm64

  telemetry:
    platform: linux/arm64
    environment:
      TELEMETRY_BACKEND: dynamodb
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_PREFIX: ${DYNAMODB_TABLE_PREFIX:-eduardoos}

  s3:
    platform: linux/arm64
    environment:
      S3_BACKEND: aws
      S3_BUCKET: ${S3_BUCKET:-eduardoos20260607}
      S3_PREFIX: ${S3_PREFIX:-media}
      AWS_REGION: ${AWS_REGION:-us-east-1}

  chatbot:
    platform: linux/arm64

  tester:
    platform: linux/arm64
    environment:
      TESTER_BACKEND: dynamodb
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE_PREFIX: ${DYNAMODB_TABLE_PREFIX:-eduardoos}

  payments:
    platform: linux/arm64

  nginx:
    platform: linux/arm64
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro

  certbot:
    platform: linux/arm64
