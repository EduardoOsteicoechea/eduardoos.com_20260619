# HTTP → HTTPS redirect and ACME challenge
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Primary HTTPS entry — Astro static site + API gateway proxy
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/localhost/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Astro SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API gateway — only public backend surface
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-ID $request_id;
    }
}
